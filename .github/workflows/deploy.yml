name: Build & Deploy to Azure App Service

on:
 push:
   branches: [main]
 workflow_dispatch: 

jobs:
 build-and-deploy:
   name: Build and Deploy Application
   runs-on: ubuntu-latest

   steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Setup Node tanpa constraint cache npm
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ vars.NODE_VERSION }}

    # 2. Menggunakan 'npm install' biasa karena tidak ada package-lock.json
    - name: Install dependencies
      run: npm install

    - name: Build Next.js application
      run: npm run build
      env:
        NODE_ENV: production
        MONGODB_URL: ${{ secrets.MONGODB_URL }}

    # 3. Menyesuaikan copy package.json agar aman
    - name: Create deployment package
      run: |
       mkdir -p deployment-package
       cp -r .next deployment-package/
       cp -r public deployment-package/ 2>/dev/null || true
       cp package.json deployment-package/ 2>/dev/null || true

    # 4. Menggunakan 'npm install --production' untuk menghemat space package
    - name: Install deployment package dependencies
      working-directory: deployment-package
      run: npm install --production
      
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ vars.WEBAPP_NAME }}
        slot-name: 'Production'
        package: deployment-package
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}