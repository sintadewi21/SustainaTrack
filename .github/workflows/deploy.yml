name: Build & Deploy to Azure App Service

on:
 push:
   branches: [main]
 workflow_dispatch: 

jobs:
 build-and-deploy:
   name: Build and Deploy Application
   runs-on: ubuntu-latest

   steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Setup Node.js dan Aktifkan Caching karena package-lock.json kamu sudah ada dan valid!
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ vars.NODE_VERSION }}
        cache: npm
        cache-dependency-path: package-lock.json

    # 2. Gunakan 'npm ci' karena package-lock.json kamu sudah terdefinisi dengan sangat baik
    - name: Install dependencies
      run: npm ci

    # 3. KARENA BACKEND EXPRESS TIDAK BUTUH BUILD, LANGSUNG BUAT DEPLOYMENT PACKAGE
    - name: Create deployment package
      run: |
       mkdir -p deployment-package
       # Menyalin seluruh file server, rute, dan konfigurasi ke folder deployment
       cp -r * deployment-package/ 2>/dev/null || true
       
    # 4. Bersihkan node_modules devDependencies agar package yang di-deploy ke Azure ringan
    - name: Install production dependencies only
      working-directory: deployment-package
      run: npm ci --omit=dev
      
    # 5. Lepaskan ke Azure Web App
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ vars.WEBAPP_NAME }}
        slot-name: 'Production'
        package: deployment-package
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}