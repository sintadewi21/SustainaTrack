name: Build & Deploy to Azure App Service

on:
 push:
   branches: [main]
 workflow_dispatch: 

jobs:
 build-and-deploy:
   name: Build and Deploy Application
   runs-on: ubuntu-latest

   steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Setup Node murni tanpa instruksi cache
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ vars.NODE_VERSION }}

    # 2. Gunakan npm install biasa agar tidak butuh package-lock.json yang rewel
    - name: Install dependencies
      run: npm install

    # 3. Membuat deployment package untuk Express backend
    - name: Create deployment package
      run: |
       mkdir -p deployment-package
       cp -r * deployment-package/ 2>/dev/null || true
       
    # 4. Install hanya produksi dependencies untuk menghemat ruang di Azure
    - name: Install production dependencies only
      working-directory: deployment-package
      run: npm install --production
      
    # 5. Deploy ke Azure Web App
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ vars.WEBAPP_NAME }}
        slot-name: 'Production'
        package: deployment-package
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}