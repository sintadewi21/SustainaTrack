name: Build & Deploy to Azure App Service

on:
 push:
   branches: [main]
 workflow_dispatch: 

jobs:
 build-and-deploy:
   name: Build and Deploy Application
   runs-on: ubuntu-latest

   steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ vars.NODE_VERSION }}

    # 1. Masuk ke folder backend untuk install dependencies
    - name: Install backend dependencies
      working-directory: backend
      run: npm install

    # 2. Membuat paket deployment khusus untuk isi folder backend
    - name: Create deployment package
      run: |
       mkdir -p deployment-package
       cp -r backend/* deployment-package/ 2>/dev/null || true
       
    # 3. Install dependencies production saja di dalam paket deployment
    - name: Install production dependencies only
      working-directory: deployment-package
      run: npm install --production
      
    # 4. Deploy ke Azure Web App
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ vars.WEBAPP_NAME }}
        slot-name: 'Production'
        package: deployment-package
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}